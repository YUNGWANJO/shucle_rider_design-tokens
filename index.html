<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shucle Token Viewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --p:#2462F7;--p2:#1245c9;--a:#00D740;
  --bg:#F0F3FF;--bg2:#E4E9FA;--surf:#fff;
  --border:rgba(36,98,247,0.10);
  --txt:#0C1A3D;--txt2:#4A5580;--txt3:#8892B8;
  --r:12px;--mono:'Pretendard',-apple-system,sans-serif;--sans:'Pretendard',-apple-system,sans-serif;
  --fs-base:15px;--fs-sm:15px;--fs-xs:15px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);min-height:100vh;font-size:var(--fs-base);}
.accent-line{height:3px;background:linear-gradient(90deg,var(--p),var(--a));}

/* topbar */
.topbar{height:64px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:100;box-shadow:0 1px 12px rgba(36,98,247,0.06);}
.logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;letter-spacing:-0.3px;}
.logo-mark{width:30px;height:30px;border-radius:8px;background:var(--p);display:grid;place-items:center;}
.logo-mark::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--a);}
.top-right{display:flex;align-items:center;gap:8px;}
.btn{display:flex;align-items:center;gap:6px;border:none;padding:9px 16px;border-radius:8px;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-primary{background:var(--p);color:white;}
.btn-primary:hover{background:var(--p2);transform:translateY(-1px);}
.btn-ghost{background:var(--bg2);color:var(--txt);}
.btn-ghost:hover{background:#d5dcf0;}
.btn-green{background:var(--a);color:#003d12;}
.btn-green:hover{background:#00b836;transform:translateY(-1px);}
.btn-green:disabled{background:#b3f0c8;color:#6abf86;cursor:not-allowed;transform:none;}
.divider{width:1px;height:24px;background:var(--border);}
#fi,#fi2{display:none;}

/* tabs */
.tabs{background:var(--surf);border-bottom:1px solid var(--border);padding:0 32px;display:flex;}
.tab{padding:14px 20px;font-size:15px;font-weight:700;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:0px;}
.tab:hover{color:var(--p);}
.tab.active{color:var(--p);border-bottom-color:var(--p);}

/* mode bar */
.mode-bar{padding:24px 32px 0;display:flex;align-items:center;justify-content:space-between;max-width:1280px;margin:0 auto;}
.mode-toggle{display:flex;background:var(--bg2);border-radius:10px;padding:4px;gap:2px;}
.mode-btn{padding:7px 16px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--txt3);border:none;background:none;font-family:var(--sans);}
.mode-btn.active{background:var(--surf);color:var(--p);box-shadow:0 1px 4px rgba(36,98,247,0.12);}
.stats{display:flex;gap:10px;flex-wrap:wrap;}
.chip{background:var(--surf);border:1px solid var(--border);border-radius:100px;padding:6px 14px 6px 10px;display:flex;align-items:center;gap:6px;font-size:15px;color:var(--txt2);font-weight:600;}
.dot{width:8px;height:8px;border-radius:50%;}

/* main */
main{padding:24px 32px 64px;max-width:1280px;margin:0 auto;}
.section{display:none;}
.section.active{display:block;animation:up .3s ease;}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.cat-label{font-size:15px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--txt3);margin:32px 0 14px;padding-left:2px;display:flex;align-items:center;gap:8px;}
.cat-label span{background:var(--bg2);padding:2px 10px;border-radius:4px;color:var(--txt2);font-size:15px;}

/* color */
.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}
.color-card{background:var(--surf);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .18s;}
.color-card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(36,98,247,0.12);}
.swatch{height:96px;width:100%;position:relative;}
.copy-hint{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.4);color:white;font-size:15px;padding:3px 10px;border-radius:4px;opacity:0;transition:opacity .15s;font-family:var(--mono);}
.color-card:hover .copy-hint{opacity:1;}
.cinfo{padding:12px 14px;}
.cname{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:4px;}
.chex{font-family:var(--mono);font-size:15px;color:var(--txt2);}
.calias{font-family:var(--mono);font-size:15px;color:var(--txt3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* typo */
.typo-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:10px;display:flex;align-items:center;gap:32px;transition:all .18s;cursor:pointer;position:relative;}
.typo-card:hover{border-color:var(--p);box-shadow:0 3px 16px rgba(36,98,247,0.12);transform:translateY(-2px);}
.tmeta{min-width:220px;flex-shrink:0;}
.ttoken{font-family:var(--mono);font-size:15px;color:var(--p);background:rgba(36,98,247,0.08);padding:4px 10px;border-radius:6px;display:inline-block;margin-bottom:8px;transition:background .15s;}
.typo-card:hover .ttoken{background:rgba(36,98,247,0.16);}
.tspec{font-size:15px;color:var(--txt3);font-family:var(--mono);line-height:2.0;}
.tspec b{color:var(--txt2);font-weight:500;}
.tpreview{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt);}
.tcopy-hint{position:absolute;top:50%;right:20px;transform:translateY(-50%);background:rgba(36,98,247,0.10);color:var(--p);font-size:15px;font-family:var(--sans);font-weight:600;padding:5px 12px;border-radius:6px;opacity:0;transition:opacity .15s;pointer-events:none;}
.typo-card:hover .tcopy-hint{opacity:1;}

/* changelog */
.changelog-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.changelog-title{font-size:24px;font-weight:800;letter-spacing:-0.5px;}
.cl-empty{text-align:center;padding:64px;color:var(--txt3);}
.cl-empty-icon{font-size:40px;margin-bottom:14px;display:block;}
.cl-item{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:22px 26px;margin-bottom:12px;display:flex;gap:24px;align-items:flex-start;transition:all .18s;}
.cl-item:hover{box-shadow:0 3px 16px rgba(36,98,247,0.08);}
.cl-date-col{min-width:160px;flex-shrink:0;}
.cl-date{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--txt);margin-bottom:4px;}
.cl-time{font-family:var(--mono);font-size:15px;color:var(--txt3);}
.cl-badge{display:inline-flex;align-items:center;gap:4px;margin-top:8px;background:rgba(36,98,247,0.08);color:var(--p);font-size:15px;font-weight:700;padding:3px 10px;border-radius:4px;font-family:var(--mono);}
.cl-content{flex:1;}
.cl-files{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.cl-file-tag{font-size:15px;font-weight:600;padding:4px 10px;border-radius:4px;font-family:var(--mono);}
.cl-file-color{background:rgba(36,98,247,0.08);color:var(--p);}
.cl-file-typo{background:rgba(0,215,64,0.10);color:#007a28;}
.cl-memo{font-size:15px;color:var(--txt2);line-height:1.6;}
.cl-memo-empty{font-size:15px;color:var(--txt3);font-style:italic;}

/* github modal */
.modal-overlay{position:fixed;inset:0;background:rgba(12,26,61,0.5);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--surf);border-radius:16px;padding:36px;width:500px;max-width:90vw;box-shadow:0 20px 60px rgba(12,26,61,0.2);}
.modal-title{font-size:20px;font-weight:800;margin-bottom:8px;letter-spacing:-0.3px;}
.modal-sub{font-size:15px;color:var(--txt3);margin-bottom:28px;line-height:1.6;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:15px;font-weight:700;color:var(--txt2);margin-bottom:8px;letter-spacing:0px;}
.field input,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:15px;color:var(--txt);outline:none;transition:border-color .15s;background:var(--bg);}
.field input:focus,.field textarea:focus{border-color:var(--p);}
.field textarea{resize:vertical;min-height:80px;font-family:var(--sans);font-size:15px;}
.field .hint{font-size:15px;color:var(--txt3);margin-top:6px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.modal-actions .btn{padding:10px 22px;font-size:15px;}
.push-status{margin-top:14px;padding:12px 16px;border-radius:8px;font-size:15px;font-family:var(--sans);display:none;}
.push-status.success{background:rgba(0,215,64,0.12);color:#007a28;display:block;}
.push-status.error{background:rgba(255,59,48,0.10);color:#c0392b;display:block;}
.push-status.loading{background:rgba(36,98,247,0.08);color:var(--p);display:block;}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--txt);color:white;padding:11px 20px;border-radius:8px;font-size:15px;font-family:var(--sans);font-weight:600;transition:transform .28s cubic-bezier(.34,1.56,.64,1);z-index:9999;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="accent-line"></div>

<header class="topbar">
  <div class="logo"><div class="logo-mark"></div>Shucle Token Viewer</div>
  <div class="top-right">
    <button class="btn btn-ghost" onclick="document.getElementById('fi').click()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>색상 교체
    </button>
    <input type="file" id="fi" accept=".json" onchange="handleFile(event,'color')">
    <button class="btn btn-ghost" onclick="document.getElementById('fi2').click()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>타이포 교체
    </button>
    <input type="file" id="fi2" accept=".json" onchange="handleFile(event,'typo')">
    <div class="divider"></div>
    <button class="btn btn-green" id="pushBtn" onclick="openPushModal()" disabled style="opacity:0.4">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>GitHub에 저장
    </button>
    <button class="btn btn-ghost" onclick="openSettingsModal()" title="GitHub 설정">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </div>
</header>

<nav class="tabs">
  <div class="tab active" onclick="switchTab('colors',this)">🎨 Colors</div>
  <div class="tab" onclick="switchTab('typography',this)">✏️ Typography</div>
  <div class="tab" onclick="switchTab('changelog',this)">📋 Changelog</div>
</nav>

<div class="mode-bar" id="modeBar">
  <div class="stats" id="statsArea"></div>
  <div class="mode-toggle" id="modeToggle" style="display:none"></div>
</div>

<main>
  <section id="colors" class="section active"><div id="colorsContent"></div></section>
  <section id="typography" class="section"><div id="typoContent"></div></section>
  <section id="changelog" class="section"><div id="changelogContent"></div></section>
</main>

<!-- GitHub Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-title">GitHub 연동 설정</div>
    <div class="modal-sub">한 번만 입력하면 브라우저에 저장돼요. Token은 외부로 전송되지 않아요.</div>
    <div class="field">
      <label>Personal Access Token</label>
      <input type="password" id="s-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      <div class="hint">GitHub → Settings → Developer settings → Personal access tokens (repo 권한 필요)</div>
    </div>
    <div class="field">
      <label>Repository</label>
      <input type="text" id="s-repo" placeholder="YUNGWANJO/design-tokens">
    </div>
    <div class="field">
      <label>Branch</label>
      <input type="text" id="s-branch" placeholder="main" value="main">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('settingsModal')">취소</button>
      <button class="btn btn-primary" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>

<!-- Push Modal -->
<div class="modal-overlay" id="pushModal">
  <div class="modal">
    <div class="modal-title">GitHub에 저장</div>
    <div class="modal-sub">업로드한 토큰을 GitHub에 반영하고 Changelog를 기록해요.</div>
    <div class="field">
      <label>업데이트 메모 <span style="color:var(--txt3);font-weight:400">(선택)</span></label>
      <textarea id="push-memo" placeholder="예: Primary 색상 계열 업데이트, Headline 사이즈 조정..."></textarea>
    </div>
    <div class="field">
      <label>변경된 파일</label>
      <div id="changedFiles" style="display:flex;gap:6px;flex-wrap:wrap;padding:8px 0;"></div>
    </div>
    <div class="push-status" id="pushStatus"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('pushModal')">취소</button>
      <button class="btn btn-green" id="doPushBtn" onclick="doPush()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 16V4m0 0L3 8m4-4l4 4"/></svg>저장하기
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── Helpers ───────────────────────────────────────────────
function rgbaToHex(rv) {
  const h = v => Math.round(v*255).toString(16).padStart(2,'0');
  const base = '#'+h(rv.r)+h(rv.g)+h(rv.b);
  return (rv.a !== undefined && Math.round(rv.a*255) < 255) ? base+h(rv.a) : base;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>el.classList.remove('show'),2000);
}

function copyText(t) {
  navigator.clipboard.writeText(t).catch(()=>{});
  toast(t+' 복사됨 ✓');
}

// ── Settings (localStorage) ───────────────────────────────
function loadSettings() {
  return {
    token: localStorage.getItem('gh_token')||'',
    repo:  localStorage.getItem('gh_repo')||'YUNGWANJO/design-tokens',
    branch:localStorage.getItem('gh_branch')||'main'
  };
}

function openSettingsModal() {
  const s = loadSettings();
  document.getElementById('s-token').value = s.token;
  document.getElementById('s-repo').value  = s.repo;
  document.getElementById('s-branch').value= s.branch;
  document.getElementById('settingsModal').classList.add('open');
}

function saveSettings() {
  localStorage.setItem('gh_token',  document.getElementById('s-token').value.trim());
  localStorage.setItem('gh_repo',   document.getElementById('s-repo').value.trim());
  localStorage.setItem('gh_branch', document.getElementById('s-branch').value.trim());

  toast('설정 저장됨 ✓');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.getElementById('pushStatus').style.display='none';
  document.getElementById('pushStatus').className='push-status';
}

// ── File upload ───────────────────────────────────────────
function handleFile(e, type) {
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if(type==='color') {
        colorData = d;
        colorMode = Object.keys(d.modes||{})[0]||colorMode;
        pendingFiles.color = { name: f.name, content: ev.target.result };
      } else {
        typoData = d;
        typoMode = Object.keys(d.modes||{})[0]||typoMode;
        pendingFiles.typo = { name: f.name, content: ev.target.result };
      }
      console.log('pendingFiles:', pendingFiles); // debug
      updatePushBtn();
      if(curTab==='colors') updateColorBar(); else if(curTab==='typography') updateTypoBar();
      toast(f.name + ' 로드됨 ✓');
    } catch { alert('JSON 파싱 오류'); }
  };
  reader.readAsText(f);
}

function updatePushBtn() {
  const hasFile = Object.keys(pendingFiles).length > 0;
  const btn = document.getElementById('pushBtn');
  btn.disabled = !hasFile;
  btn.style.opacity = hasFile ? '1' : '0.4';
  btn.title = hasFile ? 'GitHub에 저장' : 'JSON 파일을 먼저 업로드해주세요';
}

// ── Push to GitHub ────────────────────────────────────────
function openPushModal() {
  const cf = document.getElementById('changedFiles');
  cf.innerHTML = '';
  if(pendingFiles.color) cf.innerHTML += `<span class="cl-file-tag cl-file-color">🎨 ${pendingFiles.color.name}</span>`;
  if(pendingFiles.typo)  cf.innerHTML += `<span class="cl-file-tag cl-file-typo">✏️ ${pendingFiles.typo.name}</span>`;
  document.getElementById('push-memo').value = '';
  document.getElementById('pushModal').classList.add('open');
}

async function getFileSHA(token, repo, branch, path) {
  const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}?ref=${branch}`, {
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
  });
  if(r.ok) { const d = await r.json(); return d.sha; }
  return null;
}

async function pushFile(token, repo, branch, path, content, message) {
  const sha = await getFileSHA(token, repo, branch, path);
  const body = {
    message, branch,
    content: btoa(unescape(encodeURIComponent(content)))
  };
  if(sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
    method: 'PUT',
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return r.ok;
}

async function doPush() {
  const s = loadSettings();
  if(!s.token) { alert('GitHub Token이 없어요. 설정(⚙️)에서 먼저 입력해주세요.'); return; }

  const memo = document.getElementById('push-memo').value.trim();
  const btn = document.getElementById('doPushBtn');
  const status = document.getElementById('pushStatus');

  btn.disabled = true;
  status.className = 'push-status loading';
  status.textContent = '⏳ GitHub에 업로드 중...';

  try {
    const now = new Date();
    const dateStr = now.toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'});
    const timeStr = now.toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
    const commitMsg = memo ? `[Token Viewer] ${memo}` : `[Token Viewer] 토큰 업데이트 ${dateStr}`;
    
    // Push the main viewer HTML (self) to index.html
    const htmlContent = document.documentElement.outerHTML;
    let allOk = true;

    // Push color JSON if changed
    if(pendingFiles.color) {
      const ok = await pushFile(s.token, s.repo, s.branch, pendingFiles.color.name, pendingFiles.color.content, commitMsg);
      if(!ok) allOk = false;
    }
    // Push typo JSON if changed
    if(pendingFiles.typo) {
      const ok = await pushFile(s.token, s.repo, s.branch, pendingFiles.typo.name, pendingFiles.typo.content, commitMsg);
      if(!ok) allOk = false;
    }
    // Always push the viewer HTML (so changelog is saved)
    const viewerHtml = buildUpdatedHTML(now, memo);
    const htmlOk = await pushFile(s.token, s.repo, s.branch, 'index.html', viewerHtml, commitMsg);
    if(!htmlOk) allOk = false;

    if(allOk) {
      // Add to local changelog
      const entry = {
        date: dateStr, time: timeStr,
        memo: memo || '',
        files: Object.keys(pendingFiles).map(k => ({type:k, name:pendingFiles[k].name}))
      };
      changelog.unshift(entry);
      saveChangelog();
      pendingFiles = {};
      updatePushBtn();

      status.className = 'push-status success';
      status.textContent = '✅ GitHub 업로드 완료! 1~2분 후 사이트에 반영돼요.';
      renderChangelog();
      setTimeout(()=>closeModal('pushModal'), 2500);
    } else {
      status.className = 'push-status error';
      status.textContent = '❌ 업로드 실패. Token이나 Repository 설정을 확인해주세요.';
    }
  } catch(err) {
    status.className = 'push-status error';
    status.textContent = '❌ 오류: ' + err.message;
  }
  btn.disabled = false;
}

function buildUpdatedHTML(now, memo) {
  // Return the current page HTML - GitHub will host it as index.html
  return document.documentElement.outerHTML;
}

// ── Changelog (localStorage) ──────────────────────────────
function saveChangelog() {
  localStorage.setItem('token_changelog', JSON.stringify(changelog));
}

function loadChangelog() {
  try {
    changelog = JSON.parse(localStorage.getItem('token_changelog')||'[]');
  } catch { changelog = []; }
}

function renderChangelog() {
  const el = document.getElementById('changelogContent');
  if(changelog.length === 0) {
    el.innerHTML = `<div class="cl-empty">
      <span class="cl-empty-icon">📋</span>
      <p style="font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:6px;">아직 기록이 없어요</p>
      <p style="font-size:13px;color:var(--txt3);">JSON 파일을 업로드하고 "GitHub에 저장"하면<br>여기에 기록이 쌓여요.</p>
    </div>`;
    return;
  }
  let html = `<div class="changelog-header">
    <div class="changelog-title">Changelog <span style="font-size:14px;color:var(--txt3);font-weight:500">${changelog.length}건</span></div>
  </div>`;
  changelog.forEach((entry, i) => {
    const files = entry.files.map(f =>
      `<span class="cl-file-tag ${f.type==='color'?'cl-file-color':'cl-file-typo'}">${f.type==='color'?'🎨':'✏️'} ${f.name}</span>`
    ).join('');
    html += `<div class="cl-item">
      <div class="cl-date-col">
        <div class="cl-date">${entry.date}</div>
        <div class="cl-time">${entry.time}</div>
        ${i===0?'<div class="cl-badge">✦ 최신</div>':''}
      </div>
      <div class="cl-content">
        <div class="cl-files">${files}</div>
        ${entry.memo
          ? `<div class="cl-memo">${entry.memo}</div>`
          : `<div class="cl-memo-empty">메모 없음</div>`}
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

// ── Tab ───────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(name).classList.add('active');
  curTab = name;
  const mb = document.getElementById('modeBar');
  if(name==='changelog') { mb.style.display='none'; renderChangelog(); }
  else { mb.style.display=''; if(name==='colors') updateColorBar(); else updateTypoBar(); }
}

// ── Colors ────────────────────────────────────────────────
function updateColorBar() {
  const modes = colorData.modes||{};
  const vars = colorData.variables||[];
  const cats = {};
  vars.forEach(v=>{ const c=v.name.split('/')[0]; cats[c]=(cats[c]||0)+1; });
  document.getElementById('statsArea').innerHTML = `
    <div class="chip"><div class="dot" style="background:var(--p)"></div>${vars.length} tokens</div>
    <div class="chip"><div class="dot" style="background:var(--a)"></div>${Object.keys(cats).length} categories</div>`;
  const tog = document.getElementById('modeToggle');
  tog.style.display='flex';
  tog.innerHTML = Object.entries(modes).map(([id,name])=>
    `<button class="mode-btn ${id===colorMode?'active':''}" onclick="setColorMode('${id}')"> ${name}</button>`
  ).join('');
  renderColors();
}

function setColorMode(id) { colorMode=id; updateColorBar(); }

function renderColors() {
  const el = document.getElementById('colorsContent');
  const cats = {};
  (colorData.variables||[]).forEach(v=>{
    const cat = v.name.split('/')[0];
    if(!cats[cat]) cats[cat]=[];
    cats[cat].push(v);
  });
  let html='';
  for(const [cat,vars] of Object.entries(cats)) {
    html+=`<div class="cat-label">${cat} <span>${vars.length}</span></div><div class="color-grid">`;
    vars.forEach(v=>{
      const rv=(v.resolvedValuesByMode||{})[colorMode];
      if(!rv) return;
      const hex=rgbaToHex(rv.resolvedValue);
      const sub=v.name.split('/').slice(1).join('/');
      html+=`<div class="color-card" onclick="copyText('${hex}')">
        <div class="swatch" style="background:${hex}"><span class="copy-hint">클릭 복사</span></div>
        <div class="cinfo">
          <div class="cname">${sub||v.name}</div>
          <div class="chex">${hex}</div>
          ${rv.aliasName?`<div class="calias">${rv.aliasName}</div>`:''}
        </div></div>`;
    });
    html+='</div>';
  }
  el.innerHTML=html;
}

// ── Typography ────────────────────────────────────────────
function updateTypoBar() {
  const modes = typoData.modes||{};
  const vars = typoData.variables||[];
  document.getElementById('statsArea').innerHTML =
    `<div class="chip"><div class="dot" style="background:var(--p)"></div>${vars.length} tokens</div>`;
  const tog = document.getElementById('modeToggle');
  tog.style.display='flex';
  tog.innerHTML = Object.entries(modes).map(([id,name])=>
    `<button class="mode-btn ${id===typoMode?'active':''}" onclick="setTypoMode('${id}')"> ${name}</button>`
  ).join('');
  renderTypo();
}

function setTypoMode(id) { typoMode=id; updateTypoBar(); }

function renderTypo() {
  const el = document.getElementById('typoContent');
  const modes = typoData.modes||{};
  const cats = {};
  (typoData.variables||[]).forEach(v=>{
    const parts=v.name.split('/');
    const cat=parts.slice(1,parts.length-1).join('/')||parts[0];
    if(!cats[cat]) cats[cat]=[];
    cats[cat].push(v);
  });
  const catOrder=['Headline','Subheadline','body','caption','micro'];
  const sortedCats=Object.keys(cats).sort((a,b)=>catOrder.indexOf(a)-catOrder.indexOf(b));
  let html='';
  for(const cat of sortedCats) {
    const vars=cats[cat];
    html+=`<div class="cat-label">${cat} <span>${vars.length}</span></div>`;
    const sorted=[...vars].sort((a,b)=>{
      const av=(a.resolvedValuesByMode||{})[typoMode]?.resolvedValue||0;
      const bv=(b.resolvedValuesByMode||{})[typoMode]?.resolvedValue||0;
      return bv-av;
    });
    sorted.forEach(v=>{
      const rv=(v.resolvedValuesByMode||{})[typoMode];
      if(!rv) return;
      const px=rv.resolvedValue;
      const modeVals=Object.entries(v.resolvedValuesByMode||{}).map(([mid,rv])=>
        `<b>${modes[mid]||mid}</b>: ${rv.resolvedValue}px`
      ).join(' · ');
      html+=`<div class="typo-card" onclick="copyText('${v.name}')">
        <div class="tmeta">
          <div class="ttoken">${v.name}</div>
          <div class="tspec">${modeVals}</div>
        </div>
        <div class="tpreview" style="font-size:${Math.min(px,44)}px;line-height:1.2;">
          가나다라마바사 Aa 123
        </div>
        <span class="tcopy-hint">토큰명 복사</span>
      </div>`;
    });
  }
  el.innerHTML=html;
}

// ── Init ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', ()=>{
  loadChangelog();
  updateColorBar();
  updatePushBtn();
});
</script>
</body>
</html>
