<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Token Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --p: #2462F7; --p2: #1245c9; --a: #00D740;
  --bg: #F0F3FF; --bg2: #E4E9FA; --surf: #fff;
  --border: rgba(36,98,247,0.10);
  --txt: #0C1A3D; --txt2: #4A5580; --txt3: #8892B8;
  --r: 10px; --mono: 'DM Mono',monospace; --sans: 'Pretendard',-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);min-height:100vh;}
.accent-line{height:3px;background:linear-gradient(90deg,var(--p),var(--a));}
.topbar{height:56px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:100;box-shadow:0 1px 12px rgba(36,98,247,0.06);}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:800;letter-spacing:-0.3px;}
.logo-mark{width:26px;height:26px;border-radius:7px;background:var(--p);display:grid;place-items:center;}
.logo-mark::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--a);}
.top-right{display:flex;align-items:center;gap:10px;}
.upload-btn{display:flex;align-items:center;gap:6px;background:var(--p);color:white;border:none;padding:7px 14px;border-radius:7px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;}
.upload-btn:hover{background:var(--p2);transform:translateY(-1px);}
.upload-btn.sec{background:var(--bg2);color:var(--txt);}
.upload-btn.sec:hover{background:#d5dcf0;}
#fi,#fi2{display:none;}
.fname{font-family:var(--mono);font-size:10px;color:var(--txt3);}
.tabs{background:var(--surf);border-bottom:1px solid var(--border);padding:0 32px;display:flex;}
.tab{padding:12px 20px;font-size:11px;font-weight:700;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.5px;text-transform:uppercase;}
.tab:hover{color:var(--p);}
.tab.active{color:var(--p);border-bottom-color:var(--p);}
.mode-bar{padding:20px 32px 0;display:flex;align-items:center;justify-content:space-between;max-width:1280px;margin:0 auto;}
.mode-toggle{display:flex;background:var(--bg2);border-radius:8px;padding:3px;gap:2px;}
.mode-btn{padding:5px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--txt3);border:none;background:none;font-family:var(--sans);}
.mode-btn.active{background:var(--surf);color:var(--p);box-shadow:0 1px 4px rgba(36,98,247,0.12);}
main{padding:20px 32px 48px;max-width:1280px;margin:0 auto;}
.section{display:none;}
.section.active{display:block;animation:up .3s ease;}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.cat-label{font-size:10px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--txt3);margin:28px 0 12px;padding-left:2px;display:flex;align-items:center;gap:8px;}
.cat-label span{background:var(--bg2);padding:1px 7px;border-radius:3px;color:var(--txt2);font-size:10px;}
.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(174px,1fr));gap:12px;}
.color-card{background:var(--surf);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .18s;position:relative;}
.color-card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(36,98,247,0.12);}
.swatch{height:84px;width:100%;position:relative;}
.copy-hint{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.4);color:white;font-size:9px;padding:2px 7px;border-radius:3px;opacity:0;transition:opacity .15s;font-family:var(--mono);}
.color-card:hover .copy-hint{opacity:1;}
.cinfo{padding:10px 12px;}
.cname{font-size:12px;font-weight:700;color:var(--txt);margin-bottom:3px;}
.chex{font-family:var(--mono);font-size:10px;color:var(--txt2);}
.calias{font-family:var(--mono);font-size:9px;color:var(--txt3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.typo-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:18px 22px;margin-bottom:8px;display:flex;align-items:center;gap:28px;transition:all .18s;cursor:pointer;position:relative;}
.typo-card:hover{border-color:var(--p);box-shadow:0 3px 16px rgba(36,98,247,0.12);transform:translateY(-2px);}
.tmeta{min-width:190px;flex-shrink:0;}
.ttoken{font-family:var(--mono);font-size:10px;color:var(--p);background:rgba(36,98,247,0.08);padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:7px;transition:background .15s;}
.typo-card:hover .ttoken{background:rgba(36,98,247,0.16);}
.tspec{font-size:10px;color:var(--txt3);font-family:var(--mono);line-height:1.9;}
.tspec b{color:var(--txt2);font-weight:500;}
.tpreview{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt);}
.tcopy-hint{position:absolute;top:50%;right:16px;transform:translateY(-50%);background:rgba(36,98,247,0.10);color:var(--p);font-size:9px;font-family:var(--mono);font-weight:600;padding:3px 9px;border-radius:4px;opacity:0;transition:opacity .15s;pointer-events:none;}
.typo-card:hover .tcopy-hint{opacity:1;}
.stats{display:flex;gap:10px;flex-wrap:wrap;}
.chip{background:var(--surf);border:1px solid var(--border);border-radius:100px;padding:4px 12px 4px 9px;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt2);font-weight:600;}
.dot{width:7px;height:7px;border-radius:50%;}
.empty{text-align:center;padding:64px 32px;}
.empty-icon{font-size:38px;margin-bottom:14px;display:block;}
.empty h3{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--txt2);}
.empty p{font-size:13px;color:var(--txt3);line-height:1.6;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--txt);color:white;padding:9px 18px;border-radius:8px;font-size:12px;font-family:var(--mono);transition:transform .28s cubic-bezier(.34,1.56,.64,1);z-index:9999;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="accent-line"></div>
<header class="topbar">
  <div class="logo"><div class="logo-mark"></div>Token Viewer</div>
  <div class="top-right">
    <span class="fname" id="fn1">Semantic_Color_Tokens.json ✓</span>
    <button class="upload-btn" onclick="document.getElementById('fi').click()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>색상 교체
    </button>
    <input type="file" id="fi" accept=".json" onchange="handleFile(event,'color')">
    <span class="fname" id="fn2">Typography.json ✓</span>
    <button class="upload-btn sec" onclick="document.getElementById('fi2').click()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>타이포 교체
    </button>
    <input type="file" id="fi2" accept=".json" onchange="handleFile(event,'typo')">
  </div>
</header>
<nav class="tabs">
  <div class="tab active" onclick="switchTab('colors',this)">🎨 Colors</div>
  <div class="tab" onclick="switchTab('typography',this)">✏️ Typography</div>
</nav>
<div class="mode-bar" id="modeBar">

  <div class="mode-toggle" id="modeToggle" style="display:none"></div>
</div>
<main>

const typoData  = {"id": "VariableCollectionId:23763:86", "name": "Typography", "modes": {"23763:0": "normall", "23763:1": "large", "23763:2": "200%"}, "variables": [{"id": "VariableID:23763:88", "name": "font-size/Headline/40", "type": "FLOAT", "resolvedValuesByMode": {"23763:0": {"resolvedValue": 32}, "23763:1": {"resolvedValue": 42}, "23763:2": {"resolvedValue": 64}}}, {"id": "VariableID:23765:96", "name": "font-size/Headline/30", "type": "FLOAT", "resolvedValuesByMode": {"23763:0": {"resolvedValue": 28}, "23763:1": {"resolvedValue": 38}, "23763:2": {"resolvedValue": 56}}}, {"id": "VariableID:23765:98", "name": "font-size/Headline/20", "type": "FLOAT", "resolvedValuesByMode": {"23763:0": {"resolvedValue": 24}, "23763:1": {"resolvedValue": 34}, "23763:2": {"resolvedValue": 48}}}, {"id": "VariableID:23765:99", "name": "font-size/Headline/10", "type": "FLOAT", "resolvedValuesByMode": {"23763:0": {"resolvedValue": 22}, "23763:1": {"resolvedValue": 32}, "23763:2": {"resolvedValue": 44}}}, {"id": "VariableID:23765:100", "name": "font-size/Subheadline/30", "type": "FLOAT", "resolvedValuesByMode": {"23763:0": {"resolvedValue": 20}, "23763:1": {"resolvedValue": 30}, "23763:2": {"resolvedValue": 40}}}, {"id": "VariableID:23765:102", "name": "font-size/Subheadline/20", "type": "FLOAT", "resolvedValuesByMode": {"23763:0": {"resolvedValue": 18}, "23763:1": {"resolvedValue": 28}, "23763:2": {"resolvedValue": 36}}}, {"id": "VariableID:23765:101", "name": "font-size/Subheadline/10", "type": "FLOAT", "resolvedValuesByMode": {"23763:0": {"resolvedValue": 17}, "23763:1": {"resolvedValue": 27}, "23763:2": {"resolvedValue": 34}}}, {"id": "VariableID:23765:165", "name": "font-size/body/20", "type": "FLOAT", "resolvedValuesByMode": {"23763:0": {"resolvedValue": 16}, "23763:1": {"resolvedValue": 26}, "23763:2": {"resolvedValue": 32}}}, {"id": "VariableID:23765:164", "name": "font-size/body/10", "type": "FLOAT", "resolvedValuesByMode": {"23763:0": {"resolvedValue": 15}, "23763:1": {"reso let colorMode = '22249:0';
let typoMode  = '23763:0';
let curTab = 'colors';

function rgbaToHex(rv) {
  const h = v => Math.round(v*255).toString(16).padStart(2,'0');
  const base = '#'+h(rv.r)+h(rv.g)+h(rv.b);
  return (rv.a !== undefined && Math.round(rv.a*255) < 255) ? base+h(rv.a) : base;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>el.classList.remove('show'),1800);
}

function copyText(t) {
  navigator.clipboard.writeText(t).catch(()=>{});
  toast(t+' 복사됨 ✓');
}

function handleFile(e, type) {
  const f = e.target.files[0]; if(!f) return;
  document.getElementById(type==='color'?'fn1':'fn2').textContent = f.name+' ✓';
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if(type==='color') { Object.assign(colorData, d); colorMode = Object.keys(d.modes||{})[0]||colorMode; renderColors(); }
      else { Object.assign(typoData, d); typoMode = Object.keys(d.modes||{})[0]||typoMode; renderTypo(); }
    } catch { alert('JSON 파싱 오류'); }
  };
  r.readAsText(f);
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(name).classList.add('active');
  curTab = name;
  if(name==='colors') updateColorBar(); else updateTypoBar();
}

function updateColorBar() {
  const modes = colorData.modes||{};
  const vars = colorData.variables||[];
  const cats = {};
  vars.forEach(v=>{ const c=v.name.split('/')[0]; cats[c]=(cats[c]||0)+1; });
  document.getElementById('statsArea').innerHTML = `
    <div class="chip"><div class="dot" style="background:var(--p)"></div>${vars.length} tokens</div>
    <div class="chip"><div class="dot" style="background:var(--a)"></div>${Object.keys(cats).length} categories</div>`;
  const tog = document.getElementById('modeToggle');
  tog.style.display='flex';
  tog.innerHTML = Object.entries(modes).map(([id,name])=>
    `<button class="mode-btn ${id===colorMode?'active':''}" onclick="setColorMode('${id}')"> ${name}</button>`
  ).join('');
  renderColors();
}

function setColorMode(id) { colorMode=id; updateColorBar(); }

function renderColors() {
  const el = document.getElementById('colorsContent');
  const modes = colorData.modes||{};
  const cats = {};
  (colorData.variables||[]).forEach(v=>{
    const cat = v.name.split('/')[0];
    if(!cats[cat]) cats[cat]=[];
    cats[cat].push(v);
  });
  let html='';
  for(const [cat,vars] of Object.entries(cats)) {
    html+=`<div class="cat-label">${cat} <span>${vars.length}</span></div><div class="color-grid">`;
    vars.forEach(v=>{
      const rv=(v.resolvedValuesByMode||{})[colorMode];
      if(!rv) return;
      const hex=rgbaToHex(rv.resolvedValue);
      const sub=v.name.split('/').slice(1).join('/');
      html+=`<div class="color-card" onclick="copyText('${hex}')">
        <div class="swatch" style="background:${hex}"><span class="copy-hint">클릭 복사</span></div>
        <div class="cinfo">
          <div class="cname">${sub||v.name}</div>
          <div class="chex">${hex}</div>
          ${rv.aliasName?`<div class="calias">${rv.aliasName}</div>`:''}
        </div></div>`;
    });
    html+='</div>';
  }
  el.innerHTML=html;
}

function updateTypoBar() {
  const modes = typoData.modes||{};
  const vars = typoData.variables||[];
  document.getElementById('statsArea').innerHTML =
    `<div class="chip"><div class="dot" style="background:var(--p)"></div>${vars.length} tokens</div>`;
  const tog = document.getElementById('modeToggle');
  tog.style.display='flex';
  tog.innerHTML = Object.entries(modes).map(([id,name])=>
    `<button class="mode-btn ${id===typoMode?'active':''}" onclick="setTypoMode('${id}')"> ${name}</button>`
  ).join('');
  renderTypo();
}

function setTypoMode(id) { typoMode=id; updateTypoBar(); }

function renderTypo() {
  const el = document.getElementById('typoContent');
  const modes = typoData.modes||{};
  const cats = {};
  (typoData.variables||[]).forEach(v=>{
    const parts=v.name.split('/');
    const cat=parts.slice(1,parts.length-1).join('/')||parts[0];
    if(!cats[cat]) cats[cat]=[];
    cats[cat].push(v);
  });
  const catOrder=['Headline','Subheadline','body','caption','micro'];
  const sortedCats=Object.keys(cats).sort((a,b)=>catOrder.indexOf(a)-catOrder.indexOf(b));
  let html='';
  for(const cat of sortedCats) {
    const vars=cats[cat];
    html+=`<div class="cat-label">${cat} <span>${vars.length}</span></div>`;
    const sorted=[...vars].sort((a,b)=>{
      const av=(a.resolvedValuesByMode||{})[typoMode]?.resolvedValue||0;
      const bv=(b.resolvedValuesByMode||{})[typoMode]?.resolvedValue||0;
      return bv-av;
    });
    sorted.forEach(v=>{
      const rv=(v.resolvedValuesByMode||{})[typoMode];
      if(!rv) return;
      const px=rv.resolvedValue;
      const modeVals=Object.entries(v.resolvedValuesByMode||{}).map(([mid,rv])=>
        `<b>${modes[mid]||mid}</b>: ${rv.resolvedValue}px`
      ).join(' · ');
      const tokenName = v.name;
      html+=`<div class="typo-card" onclick="copyText('${tokenName}')">
        <div class="tmeta">
          <div class="ttoken">${tokenName}</div>
          <div class="tspec">${modeVals}</div>
        </div>
        <div class="tpreview" style="font-size:${Math.min(px,44)}px;line-height:1.2;">
          가나다라마바사 Aa 123
        </div>
        <span class="tcopy-hint">토큰명 복사</span>
      </div>`;
    });
  }
  el.innerHTML=html;
}

window.addEventListener('DOMContentLoaded', ()=>{
  updateColorBar();
  updateTypoBar();
});
</script>
